# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: myos
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bluefin-dx
image-version: latest

modules:
  - type: files
    files:
      - usr: /usr

  - type: dnf
    repos:
      copr:
        - atim/starship
        - yuezk/globalprotect-openconnect
        - yalter/niri
        - solopasha/hyprland  # hyprlock/hypridle (also source of hypr* tools already in the image)
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
    install:
      # Fail the build if a package can't be found, instead of silently
      # shipping an image without it.
      skip-unavailable: false
      packages:
        # Editors and Terminal Tools
        - starship  # copr: atim/starship
        - helix
        - kitty
        - emacs

        # System Tools
        - timeshift
        - gnome-boxes
        - kdeconnectd
        - antimicrox
        - cliphist

        # Document Viewers
        - zathura
        - zathura-pdf-mupdf
        - zathura-ps
        - zathura-djvu

        # Icon Themes
        - papirus-icon-theme

        # VPN
        - mullvad-vpn  # repo: mullvad.repo
        - globalprotect-openconnect  # copr: yuezk/globalprotect-openconnect
        - openvpn
        - NetworkManager-openvpn
        - NetworkManager-openconnect

        # CLI Utilities
        - jq
        - atuin
        - fzf
        - dialog

        # Window Managers
        - niri  # copr: yalter/niri

        # Niri session extras (session configs live in dotfiles:
        # ~/.config/niri, ~/.config/hypr/hypr{lock,idle}.conf, ~/.config/swaync)
        - hyprlock  # copr: solopasha/hyprland
        - hypridle  # copr: solopasha/hyprland
        - SwayNotificationCenter  # swaync: notification daemon + control center

        # AGS v2 desktop shell (bar/quick-settings/notifications, ~/.config/ags).
        # niri-shell script prefers it over waybar+swaync once present.
        - aylurs-gtk-shell2  # ags CLI + runtime; copr: solopasha/hyprland
        - astal-gtk4  # copr: solopasha/hyprland
        - astal-libs  # Astal{Battery,Network,Bluetooth,Mpris,Notifd,Tray,Wp,…} typelibs

        # Wayland Tools
        - fuzzel
        - grim
        - slurp
        - wlr-randr
        - wlsunset
        - brightnessctl
        - swappy
        - dunst
        - imv
        - waypipe
        - wl-clipboard

        # Audio/Video
        - pavucontrol
        - pulseaudio-utils
        - pamixer
        - playerctl

        # Bluetooth
        - bluez-tools
        - blueman

        # Authentication
        - fprintd-pam
        - gnome-keyring-pam
        - lxqt-policykit
        - pinentry-gnome3

        # Desktop Portals (wlroots portal for niri)
        - xdg-desktop-portal-wlr

        # Qt Wayland
        - qt5-qtwayland
        - qt6-qtwayland

        # Vulkan
        - vulkan-validation-layers
        - vulkan-tools

        # GNOME/GTK
        - gnome-disk-utility
        - google-noto-emoji-fonts
        - gnome-shell-extension-pop-shell
        - network-manager-applet
        - system-config-printer

        # File Managers & Tools
        - Thunar
        - thunar-archive-plugin
        - thunar-volman
        - xarchiver

        # Android apps via Waydroid (ujust setup-waydroid; recipe in
        # config/justfiles/waydroid.just, net patch in
        # config/scripts/patch-waydroid-net.sh)
        - waydroid
        - waydroid-selinux  # policy module so waydroid runs with SELinux enforcing

        # Other Tools
        - jmtpfs
        - flameshot
        - hunspell-en
        - hunspell-en-US
        - fuse-libs  # libfuse.so.2 for the Beeper AppImage (/usr/bin/beeper)

        # claude-cowork-linux dependencies
        - nodejs
        - npm
        - 7zip  # ships /usr/bin/7z; replaced p7zip in Fedora
        - bubblewrap

        # claude-science dependencies (also uses bubblewrap, above)
        - socat  # claude-science sandbox networking (cli/src/sandbox/socat.ts)

        - power-profiles-daemon  # conflicts with tuned-ppd (removed below)

    remove:
      packages:
        - tuned-ppd  # Conflicts with power-profiles-daemon

  # Windscribe VPN (GUI app + `windscribe-cli`). Upstream ships no dnf repo, only
  # per-release Fedora RPMs on GitHub, so we install a version-pinned RPM straight
  # from the release asset (that pin is what stops a rebuild silently pulling a
  # new build). It drops the app under /opt/windscribe and a privileged
  # windscribe-helper.service (firewall / kill-switch daemon) that is enabled via
  # the systemd module below. Kept in its own dnf block with no-gpgchecks so
  # skipping Windscribe's vendor signature does NOT weaken gpg verification for
  # the Fedora / COPR / Mullvad packages above. To update: bump both version
  # numbers in the URL below; `ujust windscribe-version` flags when one exists.
  - type: dnf
    install:
      no-gpgchecks: true
      packages:
        - https://github.com/Windscribe/Desktop-App/releases/download/v2.23.11/windscribe_2.23.11_amd64_fedora.rpm

  - type: brew
    auto-update: true
    update-interval: '6h'
    update-wait-after-boot: '10min'
    auto-upgrade: true
    upgrade-interval: '8h'
    upgrade-wait-after-boot: '30min'
    nofile-limits: false
    brew-analytics: true

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        repo:
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
          name: flathub
          title: "Flathub (system-wide)"
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - com.valvesoftware.Steam
          - com.mattjakeman.ExtensionManager
          - md.obsidian.Obsidian
          - net.ankiweb.Anki
          - page.kramo.Cartridges
          - com.usebottles.bottles
          - com.vysp3r.ProtonPlus
          - net.davidotek.pupgui2
          - net.codelogistics.webapps
          - com.bitwarden.desktop
          - org.telegram.desktop
          - com.slack.Slack
          - org.gnome.baobab
          - net.nokyan.Resources
          - com.github.tchx84.Flatseal
          - org.kde.okular
          - com.discordapp.Discord
          - io.gitlab.liferooter.TextPieces
          - io.github.flattool.Warehouse
          - org.DolphinEmu.dolphin-emu
          - com.jeffser.Alpaca
          - im.riot.Riot
          - com.stremio.Stremio
          - org.gnome.Fractal
          - com.ticktick.TickTick
          - org.libreoffice.LibreOffice
          - com.wps.Office
          - com.gopeed.Gopeed
          - org.qbittorrent.qBittorrent
          - org.chromium.Chromium
          - com.github.wwmm.easyeffects
          - com.github.rafostar.Clapper
      - scope: user
        repo:
          name: flathub-user
          title: "Flathub (User)"
        install: []

  - type: script
    scripts:
      - getbeeper.sh
      - getclaude-cowork.sh
      - getclaude-science.sh
      - getmodal.sh
      - patch-waydroid-net.sh

  # Validates config/justfiles/*.just at build time and imports them into
  # ujust via /usr/share/ublue-os/just/60-custom.just.
  - type: justfiles
    validate: true

  - type: fonts
    fonts:
      nerd-fonts:
        - SourceCodePro
        - Terminus
        - JetBrainsMono
        - NerdFontsSymbolsOnly
        - Inconsolata
      google-fonts:
        - Roboto

  - type: bling
    install:
      - dconf-update-service

  - type: chezmoi
    repository: "https://github.com/AsirShahid/dotfiles"
    all-users: true
    file-conflict-policy: "skip"

  - type: gschema-overrides
    include:
      - zz1-myoverride.gschema.override

  - type: gnome-extensions
    install:
      - Night Theme Switcher
      - Blur my Shell
      - Bluetooth Battery Meter
      - Caffeine
      - 8834  # Copyous - Clipboard Manager

  - type: systemd
    system:
      enabled:
        - power-profiles-daemon.service
        - windscribe-helper.service  # Windscribe kill-switch/firewall daemon (RPM preset no-ops in offline build)
      disabled:
        - waydroid-container.service  # ujust setup-waydroid enables it on init

  - type: signing
